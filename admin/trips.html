<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Trips</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <h2>Admin</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="trips.html">Trips</a>
        <a href="bookings.html">Bookings</a>
        <a href="reports.html">Reports</a>
        <a href="media.html">Media</a>
        <a href="posts.html">Posts</a>
        <a href="settings.html">Settings</a>
        <a href="login.html" id="logoutBtn">Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <h1>Trips Management</h1>
      <form id="tripForm">
        <input id="title" placeholder="Title" required>
        <select id="category">
          <option>Island</option>
          <option>Sea</option>
          <option>Safari</option>
          <option>Water Sports</option>
          <option>Historical</option>
        </select>
        <input id="price" placeholder="Price (USD)" required>
        <input id="duration" placeholder="Duration" required>
        <textarea id="description" placeholder="Full description"></textarea>
        <button type="submit">Add Trip</button>
      </form>
      <section id="tripsList"></section>
    </main>
  </div>
  <script type="module" src="js/trips-admin.js"></script>
  <script type="module" src="js/admin-auth.js"></script>
</body>
</html>
